---
format_version: '15'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: other
tools:
  golang: 1.26.1
trigger_map:
- push_branch: main
  pipeline: pipeline_main
- pull_request_target_branch: main
  pipeline: pipeline_ci
- tag: "*.*.*"
  pipeline: pipeline_release
pipelines:
  pipeline_ci:
    workflows:
      ci: {}
  pipeline_main:
    workflows:
      ci: {}
      auto-tag:
        depends_on: [ci]
  pipeline_release:
    workflows:
      release: {}
workflows:
  ci:
    steps:
    - git-clone@8: {}
    - script:
        title: Set up environment
        inputs:
          # Set up tools based on the .tool-versions file in the repo
          - content: bitrise tools setup --config .tool-versions
    - script@1:
        title: Build
        inputs:
        - content: go build ./cmd/codepush
    - script@1:
        title: Test
        inputs:
        - content: go test -coverprofile="$BITRISE_DEPLOY_DIR/coverage.out" ./...
    - script@1:
        title: Check test coverage
        inputs:
        - content: |
            #!/bin/bash
            set -euo pipefail

            THRESHOLD=74
            COVERPROFILE="$BITRISE_DEPLOY_DIR/coverage.out"

            if [ ! -f "$COVERPROFILE" ]; then
                echo "FAIL: coverage profile not found at $COVERPROFILE"
                exit 1
            fi

            COVERAGE=$(go tool cover -func="$COVERPROFILE" | grep ^total: | awk '{print $3}' | tr -d '%')

            if [ -z "$COVERAGE" ]; then
                echo "FAIL: could not determine coverage"
                exit 1
            fi

            PASS=$(awk "BEGIN {print ($COVERAGE >= $THRESHOLD) ? 1 : 0}")

            if [ "$PASS" -eq 1 ]; then
                echo "PASS: coverage ${COVERAGE}% >= ${THRESHOLD}% threshold"
            else
                echo "FAIL: coverage ${COVERAGE}% < ${THRESHOLD}% threshold"
                exit 1
            fi
    - script@1:
        title: Check version sync
        inputs:
        - content: |
            #!/bin/bash
            set -euo pipefail

            CODE_VERSION=$(grep 'version = ' cmd/codepush/version.go | head -1 | sed 's/.*"\(.*\)".*/\1/')
            PLUGIN_VERSION=$(grep -oP 'download/\K[^/]+' bitrise-plugin.yml | head -1)

            if [ -z "$CODE_VERSION" ]; then
                echo "FAIL: could not parse version from cmd/codepush/version.go"
                exit 1
            fi

            if [ -z "$PLUGIN_VERSION" ]; then
                echo "FAIL: could not parse version from bitrise-plugin.yml"
                exit 1
            fi

            if [ "$CODE_VERSION" != "$PLUGIN_VERSION" ]; then
                echo "FAIL: version mismatch"
                echo "  cmd/codepush/version.go: $CODE_VERSION"
                echo "  bitrise-plugin.yml:      $PLUGIN_VERSION"
                exit 1
            fi

            echo "PASS: version $CODE_VERSION is consistent"
    - script@1:
        title: golangci-lint
        inputs:
        - content: golangci-lint run
  auto-tag:
    steps:
    - git-clone@8:
        inputs:
        - clone_depth: "0"
        - fetch_tags: "yes"
    - authenticate-with-github-oauth@0:
        inputs:
        - access_token: $GITHUB_TOKEN
    - script@1:
        title: Create version tag if not already tagged
        inputs:
        - content: |
            #!/bin/bash
            set -euo pipefail

            VERSION=$(grep 'version = ' cmd/codepush/version.go | head -1 | sed 's/.*"\(.*\)".*/\1/')

            if [ -z "$VERSION" ]; then
              echo "FAIL: could not parse version from version.go"
              exit 1
            fi

            echo "Code version: $VERSION"

            if git rev-parse "$VERSION" >/dev/null 2>&1; then
              echo "Tag $VERSION already exists -- nothing to do."
            else
              echo "Creating and pushing tag $VERSION"
              git tag -a "$VERSION" -m "Release $VERSION"
              git push origin "$VERSION"
            fi
  release:
    steps:
    - git-clone@8:
        inputs:
        - clone_depth: "0"
        - fetch_tags: "yes"
    - script@1:
        title: Validate tag matches code version
        inputs:
        - content: |
            #!/bin/bash
            set -euo pipefail

            TAG_VERSION="$BITRISE_GIT_TAG"
            CODE_VERSION=$(grep 'version = ' cmd/codepush/version.go | head -1 | sed 's/.*"\(.*\)".*/\1/')
            PLUGIN_VERSION=$(grep -oP 'download/\K[^/]+' bitrise-plugin.yml | head -1)

            echo "Tag version:    $TAG_VERSION"
            echo "Code version:   $CODE_VERSION"
            echo "Plugin version: $PLUGIN_VERSION"

            if [ "$TAG_VERSION" != "$CODE_VERSION" ]; then
                echo "FAIL: tag $TAG_VERSION does not match version.go version $CODE_VERSION"
                exit 1
            fi
            if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
                echo "FAIL: tag $TAG_VERSION does not match bitrise-plugin.yml version $PLUGIN_VERSION"
                exit 1
            fi
            echo "PASS: all versions are $TAG_VERSION"
    - script@1:
        title: Install GoReleaser
        inputs:
        - content: |
            #!/bin/bash
            set -euo pipefail
            curl -sSfL https://github.com/goreleaser/goreleaser/releases/latest/download/goreleaser_Linux_x86_64.tar.gz \
              | tar -xz -C /usr/local/bin goreleaser
            goreleaser --version
    - script@1:
        title: Run GoReleaser
        inputs:
        - content: |
            #!/bin/bash
            set -euo pipefail
            goreleaser release --clean
