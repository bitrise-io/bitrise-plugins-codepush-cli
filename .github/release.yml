changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "🚀 New features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug fixes"
      labels:
        - bug
        - fix
    - title: "🧹 Maintenance"
      labels:
        - chore
        - dependencies
        - documentation
    - title: "Other changes"
